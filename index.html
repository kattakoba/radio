<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Radio Stream</title>
<style>
  body {
    background: #111;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 2rem;
  }
  h1 {
    margin-bottom: 1rem;
  }
  .player {
    background: #222;
    padding: 1rem;
    border-radius: 10px;
    display: inline-block;
  }
  audio {
    width: 300px;
    outline: none;
  }
  p {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: #aaa;
  }
</style>
</head>
<body>

<h1>Live Stream</h1>
<div class="player">
  <audio controls autoplay>
    <source src="http://go-stream.live:8099/;stream.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</div>
<p>Streaming live via GitHub Pages</p>

</body>
</html>
